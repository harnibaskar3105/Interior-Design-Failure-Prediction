<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Password Reset Complete</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://i.pinimg.com/736x/cc/5f/fb/cc5ffbe969db5d627a29027fac212fe3.jpg");
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.65);
            transform: scale(1.08);
            z-index: -1;
        }

        .box {
            width: 500px;
            margin: 140px auto;
            background: white;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: black;
            color: white;
            border-radius: 10px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>✅ Password Reset Successful!</h2>
    <p>Your password has been changed successfully.</p>

    <a href="{% url 'login_view' %}">Go to Login</a>
</div>

</body>
</html>
