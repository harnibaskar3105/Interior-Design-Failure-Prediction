<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Reset Link Sent</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("https://i.pinimg.com/736x/cc/5f/fb/cc5ffbe969db5d627a29027fac212fe3.jpg");
            background-size: cover;
            background-position: center;
            filter: blur(3px) brightness(0.65);
            transform: scale(1.08);
            z-index: -1;
        }

        .navbar {
            background: linear-gradient(135deg, #544738, #fff5eb);
            color: #fff5eb;
            padding: 18px 35px;
            font-size: 22px;
            font-weight: bold;
        }

        .box {
            width: 500px;
            margin: 120px auto;
            background: white;
            padding: 40px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<div class="navbar">
    Reset Email Sent
</div>

<div class="box">
    <h2>✅ Reset Link Sent!</h2>
    <p>
        If the email exists, a password reset link has been sent.
        Please check your inbox.
    </p>
</div>

</body>
</html>
